<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daemon | Page not found</title>
  <style>
    :root {
      --bg: #101215;
      --panel: #171c22;
      --line: rgba(237, 242, 247, 0.08);
      --text: #edf2f7;
      --muted: rgba(237, 242, 247, 0.64);
      --accent: #7dd3fc;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1.5rem;
      background: radial-gradient(circle at top right, rgba(125, 211, 252, 0.12), transparent 30%), var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, sans-serif;
    }

    main {
      width: min(100%, 42rem);
      padding: 2rem;
      border-radius: 1.5rem;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--line);
      text-align: center;
    }

    h1 {
      margin: 0 0 1rem;
      font-size: clamp(2rem, 5vw, 3.5rem);
      line-height: 1;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    nav {
      display: flex;
      justify-content: center;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-top: 1.5rem;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 1rem;
      border-radius: 999px;
      border: 1px solid var(--line);
      color: var(--text);
      text-decoration: none;
    }

    a.primary {
      background: var(--accent);
      color: #08131a;
      border-color: transparent;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <p>Daemon</p>
    <h1>Page not found</h1>
    <p>The route you requested is not available. Use the landing page to return to the product or open the local dashboard directly.</p>
    <nav aria-label="Recovery links">
      <a class="primary" href="/">Go to landing page</a>
      <a href="/dashboard">Open dashboard</a>
    </nav>
  </main>
</body>
</html>
